modLoader="javafml"
loaderVersion="[${neoforge_loader_version},)"
issueTrackerURL="${mod_issues}"
license="${mod_license}"

[[mods]]
    modId="${mod_id}"
    version="${version}"
    updateJSONURL="https://coolsimulations.net/mcmods/infinity-water-bucket/versionchecker.json"
    displayURL="${mod_homepage}"
    logoFile="logo.png"
    logoBlur=false
    displayName="${mod_name}"
    credits="${mod_credit}"
    authors="${mod_author}"
    description="${mod_desc}"

[[mixins]]
    config="${mod_id}.common.mixins.json"

[[mixins]]
    config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    mandatory=true
    versionRange="[${neoforge_version},)"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="[${minecraft_version},)"
    ordering="NONE"
    side="BOTH"

[modproperties.${mod_id}]
    catalogueImageIcon="icon.png"
    catalogueBackground="minecraft:textures/block/tube_coral_block.png"
    configuredBackground="minecraft:textures/block/tube_coral_block.png"
