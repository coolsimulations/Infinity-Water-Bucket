modLoader="javafml"
loaderVersion="[${forge_loader_version},)"
issueTrackerURL="${mod_issues}"
logoFile="logo.png"
license="${mod_license}"

[[mods]]
    modId="${mod_id}"
    version="${version}"
    updateJSONURL="https://coolsimulations.net/mcmods/infinity-water-bucket/versionchecker.json"
    displayURL="${mod_homepage}"
    displayName="${mod_name}"
    credits="${mod_credit}"
    authors="${mod_author}"
    description="${mod_desc}"

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="[${forge_version},)"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="[${minecraft_version},)"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="milkallthemobs"
    mandatory=false
    versionRange="[3.3,)"
    ordering="NONE"
    side="BOTH"

[modproperties.${mod_id}]
    catalogueImageIcon="icon.png"
    catalogueBackground="minecraft:textures/block/tube_coral_block.png"
    configuredBackground="minecraft:textures/block/tube_coral_block.png"
